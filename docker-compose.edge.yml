# docker-compose usado no hardware do cliente (edge)
# O arquivo .env fica em /opt/meulanceai/.env — nunca sobrescrito por updates

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-edge
    restart: always
    ports:
      - "80:80"                        # HTTP para ESP32 chamar meulanceai.local
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - meulanceai-edge
    networks:
      - edge-network

  redis:
    image: redis:7-alpine
    container_name: redis-edge
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - edge-network
    # Redis só acessível internamente (sem expor porta no host)

  meulanceai-edge:
    image: lucassms9/meulanceai-edge:latest
    container_name: meulanceai-edge
    restart: always
    env_file:
      - /opt/meulanceai/.env          # único por cliente, persiste entre updates
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - buffer_data:/buffer            # buffer FFmpeg — sobrevive a restarts
      - hls_data:/hls                  # segmentos HLS streaming ao vivo
    expose:
      - "3000"                         # porta interna (não exposta no host, apenas nginx acessa)
    depends_on:
      - redis
    networks:
      - edge-network

  edge-auto-updater:
    image: lucassms9/meulanceai-edge-updater:latest
    container_name: edge-auto-updater
    restart: always
    env_file:
      - /opt/meulanceai/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/meulanceai:/opt/meulanceai:ro
      - updater_logs:/var/log
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - edge-network

networks:
  edge-network:
    driver: bridge

volumes:
  buffer_data:
  hls_data:
  redis_data:
  updater_logs:
