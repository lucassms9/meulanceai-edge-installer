events {
    worker_connections 1024;
}

http {
    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Timeouts para ESP32 (pode ter latência na rede)
    proxy_connect_timeout 10s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
    send_timeout 10s;

    # Buffer settings
    client_body_buffer_size 16k;
    client_max_body_size 1m;

    upstream meulanceai_backend {
        server meulanceai-edge:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name meulanceai.local localhost _;

        # ESP32 envia eventos para /event
        location /event {
            proxy_pass http://meulanceai_backend/event;
            proxy_http_version 1.1;
            
            # Headers para preservar informações do cliente
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Keep-alive
            proxy_set_header Connection "";
            
            # Timeout específico para eventos (ESP32 pode ser lento)
            proxy_read_timeout 15s;
        }

        # Health check para monitoramento
        location /health {
            proxy_pass http://meulanceai_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # API geral - caso precise acessar outros endpoints
        location /api/ {
            proxy_pass http://meulanceai_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Status do nginx
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            deny all;
        }

        # Fallback para root
        location / {
            proxy_pass http://meulanceai_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
